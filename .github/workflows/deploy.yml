name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests (gate)
        run: npm run test

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${{ secrets.VPS_PORT }}" "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync project to VPS
        run: |
          for attempt in 1 2 3 4; do
            rsync -az --delete \
              --exclude '.git' --exclude 'node_modules' --exclude '.next' --exclude '.env' \
              -e "ssh -p ${{ secrets.VPS_PORT }} -i ~/.ssh/id_ed25519" \
              ./ "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_TARGET }}/" \
              && break
            echo "rsync failed (attempt $attempt), retrying..."
            sleep $((2 ** attempt))
          done

      - name: Write .env on VPS
        env:
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          SEED_SUPER_ADMIN_EMAIL: ${{ secrets.SEED_SUPER_ADMIN_EMAIL }}
          SEED_SUPER_ADMIN_PASSWORD: ${{ secrets.SEED_SUPER_ADMIN_PASSWORD }}
          SEED_SUPER_ADMIN_NOME: ${{ secrets.SEED_SUPER_ADMIN_NOME }}
        run: |
          POSTGRES_USER=kob
          POSTGRES_DB=relatorioskob
          {
            echo "POSTGRES_USER=${POSTGRES_USER}"
            echo "POSTGRES_PASSWORD=${POSTGRES_PASSWORD}"
            echo "POSTGRES_DB=${POSTGRES_DB}"
            echo "DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public"
            echo "SESSION_SECRET=${SESSION_SECRET}"
            echo "SEED_SUPER_ADMIN_EMAIL=${SEED_SUPER_ADMIN_EMAIL}"
            echo "SEED_SUPER_ADMIN_PASSWORD=${SEED_SUPER_ADMIN_PASSWORD}"
            echo "SEED_SUPER_ADMIN_NOME=${SEED_SUPER_ADMIN_NOME:-Administrador}"
          } > .env.deploy
          scp -P "${{ secrets.VPS_PORT }}" -i ~/.ssh/id_ed25519 \
            .env.deploy \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_TARGET }}/.env"
          rm -f .env.deploy

      - name: Copy sync script
        run: |
          scp -P "${{ secrets.VPS_PORT }}" -i ~/.ssh/id_ed25519 \
            scripts/vps-sync.sh \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/home/${{ secrets.VPS_USER }}/vps-sync.sh"

      - name: Run remote build/restart
        run: |
          ssh -p "${{ secrets.VPS_PORT }}" -i ~/.ssh/id_ed25519 \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "VPS_TARGET=${{ secrets.VPS_TARGET }} bash /home/${{ secrets.VPS_USER }}/vps-sync.sh"
